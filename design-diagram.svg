<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#0f172a; stroke:#94a3b8; stroke-width:1.5px; rx:6px; }
    .label { fill:#e6eef8; font-family:Arial, Helvetica, sans-serif; font-size:14px; }
    .small { font-size:12px; fill:#bcd2ea }
    .arrow { stroke:#94a3b8; stroke-width:2px; fill:none; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="20" y="20" width="140" height="48" class="box" />
  <text x="90" y="50" text-anchor="middle" class="label">Browser / Vite</text>
  <text x="90" y="66" text-anchor="middle" class="small">:3000</text>

  <!-- Nginx -->
  <rect x="200" y="20" width="140" height="48" class="box" />
  <text x="270" y="50" text-anchor="middle" class="label">Nginx (optional)</text>

  <!-- FastAPI -->
  <rect x="380" y="20" width="180" height="64" class="box" />
  <text x="470" y="44" text-anchor="middle" class="label">FastAPI Backend</text>
  <text x="470" y="60" text-anchor="middle" class="small">:8000</text>

  <!-- Ollama -->
  <rect x="200" y="140" width="170" height="64" class="box" />
  <text x="285" y="168" text-anchor="middle" class="label">Ollama (LLM &amp; Embeddings)</text>
  <text x="285" y="184" text-anchor="middle" class="small">:11434</text>

  <!-- Qdrant -->
  <rect x="420" y="140" width="170" height="64" class="box" />
  <text x="505" y="168" text-anchor="middle" class="label">Qdrant (Vector DB)</text>
  <text x="505" y="184" text-anchor="middle" class="small">:6333</text>

  <!-- Arrows -->
  <path class="arrow" d="M160 44 L200 44" />
  <path class="arrow" d="M340 44 L380 44" />
  <path class="arrow" d="M470 84 L470 140" />
  <path class="arrow" d="M470 84 L285 140" />

  <!-- Labels under connections -->
  <text x="280" y="36" text-anchor="middle" class="small">/api/*</text>
  <text x="380" y="110" text-anchor="middle" class="small">embeddings / LLM</text>
  <text x="540" y="110" text-anchor="middle" class="small">vectors + metadata</text>

</svg>
