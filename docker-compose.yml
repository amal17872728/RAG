services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      CHAT_MODEL: ${CHAT_MODEL:-qwen2.5:3b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until ollama list >/dev/null 2>&1; do sleep 2; done
        ollama pull $${CHAT_MODEL:-qwen2.5:3b}
        ollama pull $${EMBED_MODEL:-nomic-embed-text}

  backend:
    build: ./backend
    depends_on:
      qdrant:
        condition: service_started
      ollama-pull:
        condition: service_completed_successfully
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://ollama:11434
      CHAT_MODEL: ${CHAT_MODEL:-qwen2.5:3b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  qdrant_data:
  ollama_data:
